name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Frontend: type safety + lint + build. Catches broken imports/types
  # (e.g. the kind of error that can't be caught locally without deps).
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # Build first: the TanStack Router plugin regenerates routeTree.gen.ts
      # (typed routes) during build, so typecheck below sees new routes.
      - name: Build
        run: bun run build
      - name: Typecheck
        run: bun run typecheck
      # Lint is advisory for now (repo predates CI; surfaces issues without
      # blocking). Flip to a hard gate once the existing lint debt is cleared.
      - name: Lint
        run: bun run lint
        continue-on-error: true

  # Edge functions: run the pure unit tests (no secrets, no network).
  # The e2e_test.ts is intentionally excluded — it needs deployed infra + keys.
  functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Type-check shared logic
        run: >-
          deno check
          supabase/functions/_shared/geo.ts
          supabase/functions/_shared/monitoring.ts
          supabase/functions/_shared/order-domain.ts
          supabase/functions/_shared/order-contracts.ts
          supabase/functions/agent-run/index.ts
          supabase/functions/marketing-send/index.ts
      - name: Unit tests (shared)
        run: deno test --allow-read supabase/functions/_shared/
